<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MIS 301 — Open Source Software Study Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --orange:   #BF5700;
    --orange-dk:#8B3E00;
    --cream:    #FDF8F2;
    --dark:     #1A1208;
    --gold:     #FFB347;
    --gold-lt:  #FFD280;
    --tan:      #F0E6D3;
    --border:   #D9C9B0;
    --green:    #2D7A4F;
    --red:      #B83232;
    --green-bg: #E8F5EE;
    --red-bg:   #FBE9E9;
    --text:     #2C1A0A;
    --muted:    #7A6550;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--orange);
    padding: 0;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 18px,
      rgba(0,0,0,.06) 18px,
      rgba(0,0,0,.06) 19px
    );
  }
  .header-inner {
    position: relative;
    max-width: 960px;
    margin: 0 auto;
    padding: 36px 24px 32px;
  }
  .badge {
    display: inline-block;
    background: rgba(255,255,255,.15);
    border: 1px solid rgba(255,255,255,.3);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: .72rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 4px;
    margin-bottom: 14px;
  }
  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.4rem, 6vw, 4rem);
    color: #fff;
    letter-spacing: .04em;
    line-height: 1;
    margin-bottom: 8px;
  }
  header p.sub {
    color: rgba(255,255,255,.78);
    font-size: .95rem;
    font-weight: 400;
    letter-spacing: .01em;
  }
  .longhorn-accent {
    position: absolute;
    right: 24px; top: 50%; transform: translateY(-50%);
    font-size: 5rem;
    opacity: .12;
    user-select: none;
    pointer-events: none;
  }

  /* ── TABS ── */
  .tab-bar {
    background: var(--dark);
    display: flex;
    max-width: 960px;
    margin: 0 auto;
    border-bottom: 3px solid var(--orange);
  }
  .tab-btn {
    flex: 1;
    padding: 14px 20px;
    background: transparent;
    border: none;
    color: rgba(255,255,255,.55);
    font-family: 'DM Sans', sans-serif;
    font-size: .9rem;
    font-weight: 600;
    letter-spacing: .03em;
    cursor: pointer;
    transition: all .2s;
    border-bottom: 3px solid transparent;
    margin-bottom: -3px;
  }
  .tab-btn:hover { color: var(--gold-lt); }
  .tab-btn.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  /* ── MAIN CONTAINER ── */
  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }

  /* ── SEARCH ── */
  .search-wrap {
    margin-bottom: 28px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    padding: 13px 18px 13px 44px;
    border: 2px solid var(--border);
    border-radius: 10px;
    background: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: .95rem;
    color: var(--text);
    transition: border-color .2s;
    outline: none;
  }
  .search-wrap input:focus { border-color: var(--orange); }
  .search-icon {
    position: absolute;
    left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--muted);
    font-size: 1rem;
    pointer-events: none;
  }
  #vocab-count {
    font-size: .82rem;
    color: var(--muted);
    margin-top: 8px;
    font-weight: 500;
  }

  /* ── VOCAB CARDS ── */
  #vocab-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
    gap: 20px;
  }
  @media (max-width: 600px) {
    #vocab-grid { grid-template-columns: 1fr; }
  }
  .vocab-card {
    background: #fff;
    border-radius: 12px;
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(26,18,8,.06);
    transition: transform .18s, box-shadow .18s;
  }
  .vocab-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(191,87,0,.13);
  }
  .card-head {
    background: var(--dark);
    padding: 14px 18px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
  }
  .card-term {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.25rem;
    color: var(--gold);
    letter-spacing: .04em;
    line-height: 1.1;
  }
  .cat-tag {
    font-size: .68rem;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .cat-core     { background: rgba(191,87,0,.25); color: #FFC87A; }
  .cat-model    { background: rgba(100,180,255,.18); color: #90CAFF; }
  .cat-tech     { background: rgba(100,220,150,.18); color: #7CDBA2; }
  .cat-history  { background: rgba(220,180,100,.18); color: #DDBB68; }
  .cat-business { background: rgba(200,100,200,.18); color: #D99DD9; }
  .cat-infra    { background: rgba(100,200,220,.18); color: #78D4E4; }

  .card-body { padding: 16px 18px; }
  .def-label {
    font-size: .67rem;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 4px;
  }
  .def-text {
    font-size: .88rem;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 12px;
  }
  .example-block {
    background: var(--tan);
    border-left: 3px solid var(--orange);
    border-radius: 0 6px 6px 0;
    padding: 10px 13px;
    margin-top: 4px;
  }
  .example-block .def-label { color: var(--orange-dk); }
  .example-block .def-text { color: var(--dark); margin-bottom: 0; font-style: italic; }

  /* ── QUIZ ── */
  .quiz-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .score-box {
    background: var(--dark);
    border-radius: 10px;
    padding: 10px 22px;
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: .08em;
  }
  .score-box span { color: var(--gold); }
  .reset-btn {
    background: var(--orange);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: .88rem;
    letter-spacing: .02em;
    cursor: pointer;
    transition: background .18s, transform .12s;
  }
  .reset-btn:hover { background: var(--orange-dk); transform: scale(1.03); }

  .progress-bar {
    height: 7px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 30px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--orange), var(--gold));
    border-radius: 99px;
    transition: width .4s ease;
  }

  .question-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 26px 26px 22px;
    margin-bottom: 24px;
    box-shadow: 0 2px 8px rgba(26,18,8,.05);
  }
  .q-num {
    font-size: .7rem;
    font-weight: 700;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 8px;
  }
  .q-scenario {
    font-size: .93rem;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 18px;
    padding: 14px 16px;
    background: var(--tan);
    border-radius: 8px;
    border-left: 4px solid var(--orange);
  }
  .q-stem {
    font-size: .95rem;
    font-weight: 600;
    color: var(--dark);
    margin-bottom: 14px;
    line-height: 1.5;
  }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt-btn {
    background: var(--tan);
    border: 2px solid var(--border);
    border-radius: 9px;
    padding: 12px 16px;
    text-align: left;
    font-family: 'DM Sans', sans-serif;
    font-size: .9rem;
    color: var(--text);
    cursor: pointer;
    transition: all .18s;
    line-height: 1.45;
  }
  .opt-btn:hover:not(:disabled) {
    border-color: var(--orange);
    background: #fff;
    box-shadow: 0 2px 8px rgba(191,87,0,.12);
  }
  .opt-btn .opt-letter {
    display: inline-block;
    font-weight: 700;
    color: var(--orange);
    margin-right: 6px;
  }
  .opt-btn.correct {
    background: var(--green-bg);
    border-color: var(--green);
    color: var(--green);
    font-weight: 600;
  }
  .opt-btn.wrong {
    background: var(--red-bg);
    border-color: var(--red);
    color: var(--red);
  }
  .opt-btn:disabled { cursor: default; }

  .explanation {
    margin-top: 18px;
    background: #FFFBF4;
    border: 1px solid var(--gold);
    border-radius: 10px;
    padding: 16px 18px;
    font-size: .88rem;
    line-height: 1.6;
    color: var(--dark);
    animation: fadeUp .3s ease;
  }
  .explanation strong { color: var(--orange-dk); }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 1rem;
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="badge">MIS 301 · McCombs School of Business · UT Austin</div>
    <h1>Open Source Software</h1>
    <p class="sub">Vocabulary Study Guide &amp; Practice Quiz &nbsp;·&nbsp; Chapter 8</p>
  </div>
  <div class="longhorn-accent">🤘</div>
</header>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('vocab', this)">📖&nbsp; Vocab Terms</button>
  <button class="tab-btn" onclick="switchTab('quiz', this)">📝&nbsp; Practice Quiz</button>
</div>

<div class="container">

  <!-- ══════════════ VOCAB TAB ══════════════ -->
  <div id="tab-vocab" class="tab-panel active">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Search terms, definitions, examples…" oninput="filterCards()"/>
    </div>
    <div id="vocab-count"></div>
    <div id="vocab-grid"></div>
  </div>

  <!-- ══════════════ QUIZ TAB ══════════════ -->
  <div id="tab-quiz" class="tab-panel">
    <div class="quiz-header">
      <div class="score-box">SCORE &nbsp;<span id="score-display">0</span> / 5</div>
      <button class="reset-btn" onclick="resetQuiz()">↺ &nbsp;Retake Quiz</button>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div id="quiz-container"></div>
  </div>

</div>

<script>
// ══════════════════════════════════
//  VOCAB DATA
// ══════════════════════════════════
const terms = [
  {
    term: "Open Source Software (OSS)",
    cat: "core", catLabel: "Core Concept",
    exact: "Software whose source code is publicly available for anyone to view, download, modify, and redistribute. Most OSS licenses prohibit selling derivative or customized versions; vendors instead monetize through support, consulting, or managed services.",
    simple: "Software where anyone can see the 'recipe' (code), change it, and share it for free. Think of it like a Wikipedia article anyone can edit.",
    example: "Linux is OSS — Linus Torvalds posted the code online in 1991, and today thousands of developers worldwide have contributed to it. Android, which runs on billions of phones, is also OSS built on Linux."
  },
  {
    term: "Closed Source (Proprietary) Software",
    cat: "core", catLabel: "Core Concept",
    exact: "Software where the source code is treated as intellectual property and a closely guarded secret. Only employees of the owning company can modify the code. Vendors monetize by selling executable licenses or charging monthly SaaS subscription fees.",
    simple: "Software where only the company that made it can see and change the code. You can use it but can't peek inside.",
    example: "Microsoft Windows — you can install and run it, but Microsoft never lets you see the source code. Same with Apple's macOS and iOS."
  },
  {
    term: "Source Code",
    cat: "core", catLabel: "Core Concept",
    exact: "Human-readable instructions written in a programming language (e.g., Python, Java, C++) that define how software behaves. It must be compiled or interpreted before a computer can execute it as machine code.",
    simple: "The actual written instructions (like a recipe) that programmers write to create software. Computers can't read it directly — it has to be translated first.",
    example: "If you type 'print(\"Hello World\")' in Python and save that file, that's source code. The Python interpreter translates it to machine instructions your CPU can run."
  },
  {
    term: "Konana's Ecosystem",
    cat: "model", catLabel: "Framework",
    exact: "A layered model of the IT ecosystem (Konana, 2007) with six concentric rings from innermost to outermost: Hardware → Operating System → Database Management System → Middleware → Enterprise Applications → Consumer Applications.",
    simple: "A bull's-eye diagram showing how software layers build on top of each other — hardware at the center, user apps on the outside.",
    example: "A Facebook post touches every layer: the data center hardware, Linux OS, MySQL database, Apache middleware, enterprise app logic, and finally the consumer app you see in your browser."
  },
  {
    term: "Middleware",
    cat: "model", catLabel: "Framework",
    exact: "Software in the middle tier of Konana's Ecosystem that transports and translates data between applications and databases. In web architectures, a web server (e.g., Apache, Express.js) typically plays this role.",
    simple: "The 'waitstaff' layer — it takes your request from the app, runs to the kitchen (database), and brings data back to you.",
    example: "When you search for a product on Amazon, Apache (or a similar web server) receives your request, queries the database, and sends the results back to your browser — that's middleware in action."
  },
  {
    term: "Database Management System (DBMS)",
    cat: "model", catLabel: "Framework",
    exact: "The software layer in Konana's Ecosystem responsible for data persistence, storage, and input/output operations. Examples include MySQL (relational/SQL) and MongoDB (NoSQL/document-based).",
    simple: "The software that manages where data is stored and retrieved. Think of it as the filing cabinet manager for an application.",
    example: "When you create a Spotify account, your username, password, and playlist preferences are stored and retrieved by a DBMS like MySQL or PostgreSQL."
  },
  {
    term: "Operating System (OS)",
    cat: "model", catLabel: "Framework",
    exact: "The software layer in Konana's Ecosystem that controls and allocates hardware resources (CPU, memory, storage) and provides a platform on which all other software runs.",
    simple: "The boss of the computer that manages all the physical parts and lets other programs run on top.",
    example: "Linux, Windows, and macOS are all operating systems. When you run Excel, the OS manages giving it memory, CPU time, and storage access."
  },
  {
    term: "Compiled Language",
    cat: "tech", catLabel: "Programming",
    exact: "A programming language whose source code is fully translated into machine code (binary executable) by a compiler before runtime. Compiled programs run directly on hardware without a runtime intermediary, making them generally faster.",
    simple: "A programming language that gets fully translated into machine instructions before it runs — like translating an entire book before reading it.",
    example: "C and C++ are compiled. When game studios build a video game in C++, they compile it into an .exe file. Your computer runs the compiled version, not the original code."
  },
  {
    term: "Interpreted Language",
    cat: "tech", catLabel: "Programming",
    exact: "A programming language whose source code is executed line-by-line at runtime by an interpreter (a runtime application that sits on top of the OS). Generally slower than compiled languages but easier to write and more portable.",
    simple: "A programming language that gets translated on-the-fly as it runs — like an interpreter translating a speech word-by-word in real time.",
    example: "Python is interpreted. When you run a Python script, the Python interpreter reads and executes each line one at a time. This is why Python code can run on any machine with Python installed."
  },
  {
    term: "Free Software Foundation (FSF)",
    cat: "history", catLabel: "History",
    exact: "An organization founded in 1983 by Richard Stallman on the moral principle that restricting software source code is ethically wrong. The FSF created the GNU project and the GPL license to guarantee software freedom.",
    simple: "The nonprofit Richard Stallman started in 1983 that said 'software should be free for everyone to use, modify, and share' — it kicked off the whole open-source movement.",
    example: "The FSF created GNU (a free Unix-like OS), which, when combined with Linus Torvalds' Linux kernel in 1991, produced what we now call the Linux operating system."
  },
  {
    term: "GNU General Public License (GPL)",
    cat: "history", catLabel: "History",
    exact: "An OSS license created by the FSF to guarantee that software remains 'free as in speech.' It requires that any derivative works also be distributed under the GPL, ensuring the code stays open-source forever.",
    simple: "The legal rulebook for free software that says: if you use this code and change it, you have to share your changes too. It keeps the code free for everyone, always.",
    example: "Linux uses the GPL. If a company takes Linux, modifies it, and wants to distribute it, they must publish their changes — which is why Android's core modifications to Linux are publicly available."
  },
  {
    term: "Linux Kernel",
    cat: "history", catLabel: "History",
    exact: "The core (kernel) of the Linux operating system, created in 1991 by Linus Torvalds. It is the foundational component that directly manages hardware resources and was combined with the FSF's GNU utilities to create a complete, reliable, and free OS.",
    simple: "The heart of Linux — the core program that talks to the computer's hardware. Linus Torvalds built it in 1991 as a college student in Finland.",
    example: "The Linux kernel runs on everything from the servers hosting Google's search engine to Android smartphones to the International Space Station's computers."
  },
  {
    term: "The Bus Factor",
    cat: "business", catLabel: "Risk",
    exact: "A risk measurement equal to the minimum number of key developers whose sudden unavailability (e.g., 'hit by a bus') would cause a project to fail. In the early 2000s, the global internet was dangerously dependent on a handful of unpaid Linux volunteers.",
    simple: "The risk that your whole project collapses if just one or two critical people leave. If only 2 people know how to maintain something critical, the bus factor is 2.",
    example: "In the early 2000s, multi-billion-dollar corporate internet infrastructure ran on a Linux kernel maintained by a tiny group of unpaid volunteers — a textbook bus factor crisis."
  },
  {
    term: "Fragmentation Risk / Unix Wars",
    cat: "history", catLabel: "History",
    exact: "The risk that competing companies will each create incompatible forks of an OS, destroying the ecosystem's unity. This happened with Unix in the 1980s–90s ('Unix Wars'), creating incompatible versions that raised costs industry-wide — a scenario the Linux Foundation was created to prevent.",
    simple: "The fear that different companies will all take the same open-source project and make incompatible versions, splitting it into a mess — like if every state had its own version of the dollar.",
    example: "In the 1980s–90s, AT&T, IBM, Sun, HP, and others each made their own incompatible version of Unix. You couldn't easily move software from one to another. The Linux Foundation was created so this never happens to Linux."
  },
  {
    term: "Linux Foundation",
    cat: "history", catLabel: "History",
    exact: "An industry trade association formed in 2007 when competing tech giants (IBM, HP, Intel, Oracle, Novell) agreed to collaborate. Its mission is to pay core Linux maintainers, standardize the codebase, and legally protect the Linux trademark to ensure stability for global commerce.",
    simple: "The organization where bitter rivals like IBM and Oracle agreed to work together to protect Linux — because they all needed it to run their businesses.",
    example: "The Linux Foundation is like a homeowners association for the internet's infrastructure — companies pay dues to keep the shared 'neighborhood' (Linux) well-maintained and legally protected."
  },
  {
    term: "Open Source Development Labs (OSDL)",
    cat: "history", catLabel: "History",
    exact: "An industry consortium formed in 2000 — predecessor to the Linux Foundation — specifically created to hire Linus Torvalds as a full-time paid developer to address the Bus Factor risk of the Linux kernel.",
    simple: "The group formed in 2000 that gave Linus Torvalds his first paycheck for working on Linux full-time, so the internet didn't depend on a volunteer.",
    example: "Before OSDL, Linus Torvalds maintained the Linux kernel for free in his spare time. OSDL giving him a salary was the first step in professionalizing open-source infrastructure."
  },
  {
    term: "Web 1.0 vs. Web 2.0",
    cat: "tech", catLabel: "Tech Concepts",
    exact: "Web 1.0 refers to the early internet of static, read-only web pages. Web 2.0 describes the shift to dynamic, interactive web pages where users can create and share content (e.g., YouTube, blogs, wikis, social media). Web 2.0 required new technologies like OSS stacks.",
    simple: "Web 1.0 = websites you could only read (like a digital brochure). Web 2.0 = websites you can interact with, post on, and share from — like Instagram or Wikipedia.",
    example: "A 1998 corporate homepage showing company info = Web 1.0. TikTok, where you create, comment, and share = Web 2.0."
  },
  {
    term: "Technology Stack (Tech Stack)",
    cat: "tech", catLabel: "Tech Concepts",
    exact: "A coordinated set of layered software technologies — OS, database, middleware/web server, and programming language — that work together to make a website or application function.",
    simple: "All the software layers that work together to run a website or app. Like the full kitchen setup (building, pantry, cooks, and menu board) needed to run a restaurant.",
    example: "Instagram's tech stack includes Linux (OS), PostgreSQL (database), NGINX (web server), and Python/Django (programming). Change any layer and the whole app behaves differently."
  },
  {
    term: "LAMP Stack",
    cat: "tech", catLabel: "Tech Concepts",
    exact: "The original and most prevalent open-source web stack: Linux (OS), Apache (web server/middleware), MySQL (relational database), and PHP/Python/Perl (programming languages). Still powers 40%+ of websites globally.",
    simple: "The classic set of free tools used to build most early websites — Linux, Apache, MySQL, and PHP — all open source, all free.",
    example: "Facebook, YouTube, Slack, and Wikipedia were all originally built on the LAMP stack. MySQL stores your user data, PHP generates dynamic pages, Apache handles requests, and Linux runs the servers."
  },
  {
    term: "MEAN Stack",
    cat: "tech", catLabel: "Tech Concepts",
    exact: "A modern OSS web stack using MongoDB (NoSQL document database), Express.js (web server), Angular (front-end framework), and Node.js (JavaScript runtime). Designed for real-time, data-heavy applications using JavaScript throughout every layer.",
    simple: "The modern web stack that uses JavaScript for everything — MongoDB for data, Express for the server, Angular for the front-end, and Node.js to run JS on the server.",
    example: "Netflix and Uber use MEAN-style stacks because they need real-time data (live driver location, video buffering) and a single language (JavaScript) across all layers makes development faster."
  },
  {
    term: "Full Stack Developer",
    cat: "tech", catLabel: "Tech Concepts",
    exact: "A software developer who can work across all layers of a technology stack — both the front-end (client-side) and back-end (server-side, database). The MEAN stack's use of JavaScript throughout makes hiring full-stack developers easier than the multi-language LAMP stack.",
    simple: "A developer who can do everything — build what you see on screen AND manage the behind-the-scenes server and database logic.",
    example: "A MEAN stack full-stack developer writes Angular code for the app's interface, Node.js/Express for the server, and MongoDB queries for the database — all in one language: JavaScript."
  },
  {

const catMap = {
  core: "cat-core", model: "cat-model", tech: "cat-tech",
  history: "cat-history", business: "cat-business", infra: "cat-infra"
};

function renderVocab(data) {
  const grid = document.getElementById('vocab-grid');
  grid.innerHTML = '';
  if (!data.length) {
    grid.innerHTML = '<div class="no-results">No terms match your search. Try different keywords.</div>';
    document.getElementById('vocab-count').textContent = '';
    return;
  }
  document.getElementById('vocab-count').textContent = `Showing ${data.length} of ${terms.length} terms`;
  data.forEach(t => {
    const cls = catMap[t.cat] || 'cat-core';
    grid.innerHTML += `
      <div class="vocab-card">
        <div class="card-head">
          <div class="card-term">${t.term}</div>
          <span class="cat-tag ${cls}">${t.catLabel}</span>
        </div>
        <div class="card-body">
          <div class="def-label">Exact Definition</div>
          <div class="def-text">${t.exact}</div>
          <div class="def-label">Simple Definition</div>
          <div class="def-text">${t.simple}</div>
          <div class="example-block">
            <div class="def-label">Example</div>
            <div class="def-text">${t.example}</div>
          </div>
        </div>
      </div>`;
  });
}

function filterCards() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const filtered = !q ? terms : terms.filter(t =>
    [t.term, t.exact, t.simple, t.example, t.catLabel]
      .some(s => s.toLowerCase().includes(q))
  );
  renderVocab(filtered);
}

// ══════════════════════════════════
//  RENDER QUIZ
// ══════════════════════════════════
let answered = 0, score = 0;

function renderQuiz() {
  answered = 0; score = 0;
  updateScore();
  const c = document.getElementById('quiz-container');
  c.innerHTML = '';
  questions.forEach(q => {
    const opts = q.options.map(o => `
      <button class="opt-btn" onclick="answer(this,'${o.letter}','${q.correct}',${q.num})">
        <span class="opt-letter">${o.letter}.</span> ${o.text}
      </button>`).join('');
    c.innerHTML += `
      <div class="question-card" id="qcard-${q.num}">
        <div class="q-num">Question ${q.num} of 5</div>
        <div class="q-scenario">${q.scenario}</div>
        <div class="q-stem">${q.stem}</div>
        <div class="options" id="opts-${q.num}">${opts}</div>
        <div id="exp-${q.num}"></div>
      </div>`;
  });
}

function answer(btn, chosen, correct, qNum) {
  const opts = document.querySelectorAll(`#opts-${qNum} .opt-btn`);
  opts.forEach(b => {
    b.disabled = true;
    const letter = b.querySelector('.opt-letter').textContent.replace('.','').trim();
    if (letter === correct) b.classList.add('correct');
  });
  if (chosen !== correct) btn.classList.add('wrong');
  else score++;

  const q = questions[qNum - 1];
  document.getElementById(`exp-${qNum}`).innerHTML =
    `<div class="explanation">${q.explanation}</div>`;

  answered++;
  updateScore();
}

function updateScore() {
  document.getElementById('score-display').textContent = score;
  document.getElementById('progress-fill').style.width = (answered / 5 * 100) + '%';
}

function resetQuiz() { renderQuiz(); }

// ══════════════════════════════════
//  TABS
// ══════════════════════════════════
function switchTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  btn.classList.add('active');
}

// ── INIT ──
renderVocab(terms);
