// ══════════════════════════════════════════════
//  BUILD VOCAB
// ══════════════════════════════════════════════
function buildVocab(list) {
  const grid = document.getElementById('vocabGrid');
  grid.innerHTML = '';
  if (list.length === 0) {
    grid.innerHTML = '<p style="color:#8A6640;text-align:center;padding:2rem;">No terms match your search.</p>';
    return;
  }
  list.forEach((t, i) => {
    const card = document.createElement('div');
    card.className = 'vocab-card';
    card.style.animationDelay = `${i * 0.04}s`;
    card.innerHTML = `
      <div class="card-header">
        <span class="card-num">${String(i+1).padStart(2,'0')}</span>
        <h2>${t.term}</h2>
        <span class="tag">${t.tag}</span>
      </div>
      <div class="card-body">
        <div class="def-block">
          <span class="def-label">Exact Definition</span>
          <p class="def-text">${t.exact}</p>
        </div>
        <div class="def-block">
          <span class="def-label">Simple Definition</span>
          <p class="def-text">${t.simple}</p>
        </div>
        <div class="example-block">
          <span class="def-label">Example</span>
          <p class="def-text">${t.example}</p>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

function filterCards() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = terms.filter(t =>
    t.term.toLowerCase().includes(q) ||
    t.exact.toLowerCase().includes(q) ||
    t.simple.toLowerCase().includes(q) ||
    t.tag.toLowerCase().includes(q)
  );
  buildVocab(filtered);
}

// ══════════════════════════════════════════════
//  BUILD QUIZ
// ══════════════════════════════════════════════
let score = 0;
let answered = new Array(questions.length).fill(false);

function buildQuiz() {
  const wrap = document.getElementById('quizWrap');
  wrap.innerHTML = '';
  questions.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = `q${qi}`;
    card.style.animationDelay = `${qi * 0.08}s`;
    const opts = q.options.map((o, oi) =>
      `<button class="option-btn" onclick="checkAnswer(${qi},${oi})" style="text-align:left">${o}</button>`
    ).join('');
    card.innerHTML = `
      <div class="q-header">
        <div class="q-num">${qi+1}</div>
        <p>${q.q}</p>
      </div>
      <div class="q-options">${opts}</div>
      <div class="feedback" id="fb${qi}"></div>`;
    wrap.appendChild(card);
  });
  updateScore();
}

function checkAnswer(qi, chosen) {
  if (answered[qi]) return;
  answered[qi] = true;
  const q = questions[qi];
  const card = document.getElementById(`q${qi}`);
  const btns = card.querySelectorAll('.option-btn');
  const fb = document.getElementById(`fb${qi}`);
  btns.forEach(b => b.disabled = true);
  btns[q.answer].classList.add('correct');
  if (chosen === q.answer) {
    score++;
    fb.textContent = q.explanation;
    fb.className = 'feedback show correct-fb';
  } else {
    btns[chosen].classList.add('wrong');
    fb.textContent = q.explanation;
    fb.className = 'feedback show wrong-fb';
  }
  updateScore();
}

function updateScore() {
  const total = answered.filter(Boolean).length;
  document.getElementById('scoreDisplay').textContent = `${score}/${questions.length}`;
  document.getElementById('progressFill').style.width = `${(total / questions.length) * 100}%`;
}

function resetQuiz() {
  score = 0;
  answered = new Array(questions.length).fill(false);
  buildQuiz();
}

function showTab(id, btn) {
  document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

buildVocab(terms);
buildQuiz();
</script>
